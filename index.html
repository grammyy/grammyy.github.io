<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
        <title>Gramweb</title>
        <link rel="icon" href="gramweb/favicon.ico" type="image/x-icon"/>

        <link rel="stylesheet" type="text/css" href="gramweb/html/theme.css"/>
        <link rel="stylesheet" type="text/css" href="gramweb/html/stylist.css"/>
        <link rel="stylesheet" type="text/css" href="gramweb/html/gallery.css"/>

        <script async src="gramweb/preload.js"></script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>

    <body>
        <div id="loading" class="static">
            <img src="gramweb/favicon.ico">
            <h2>GramWeb</h2>
        </div>

        <div id="side">
            <div class="taskbar">
                <button id="home" onclick="interface.none(this)">
                    <svg>
                        <use href="gramweb/svg/home.svg#home"></use>
                    </svg>
                </button>

                <div id="log">
                    <small id="output">Preloading Gramweb...</small>
                    
                    <div class="bookmark">
                        <div></div>
                    </div>

                    <small style="writing-mode: sideways-lr; font-size: 0.85vh; left: 90%">CONSOLE</small>
                </div>
            </div>

            <div class="content">
                <div id="leftbar">
                    <div id="header">
                        <div class="sub">
                            <h1 style="line-height: 32px; font-size: larger; align-self: end">VOL</h1>
                            <h1 style="line-height: 37px">12</h1>
                        </div>

                        <div class="sub" id="title">
                            <h1>GRAMWEB</h1>
                        </div>
                       
                        <h3>PROFESSIONAL PROGRAMMER</h3>
                        <p>Calender & Gallery of projects</p>
                    </div>
                    
                    <div id="updates">
                        <div>
                            <img src="./gramweb/favicon.ico">
                            <h3>something</h2>
                        </div>
                        <!--placeolders here, also remove the above later-->
                    </div>

                    <div class="beta" id="queue">
                        <div>
                            <header>
                                TODAY
                            </header>
                            <img src="gramweb/favicon.ico">
                            
                            <div>
                                <div>
                                    <header>DESC</header>
                                </div>
                                <hr>
                                <div>
                                    <header>FILE</header>
                                </div>
                            </div>
                        </div>

                        <!--placeolders here, also remove the above later-->
                    </div>


                    <p style="position: absolute; left: var(--layout-left-updates-width); top: calc(14% + (var(--layout-left-header-padding) * 2)); padding: 3px 18px; background: var(--primary); border-radius: 15px; margin: 25px; font-size: x-small; font-family: 'Inter', sans-serif; font-weight: bold">
                        QUEUE
                    </p>
                    
                    <div id="about">
                        <div id="frame">
                            <img id="pfp" src="gramweb/favicon.ico">
                        </div>

                        <div id="card">
                            <h2>ELIAS TRENT</h2>
                            <img src="resources/barcode.png">
                        </div>
                        
                        <!--more here later-->
                    
                        <div id="contacts">
                            <div class="contact">
                                <p>GMAIL</p>
                                <div>
                                </div>
                                <h3>FORM</h3>
                            </div>
                            <div class="contact" style="margin-top: 5px">
                                <p>PHONE</p>
                                <div>
                                </div>
                                <h3>FORM</h3>
                            </div>
                            
                            <div>Copyright @ Blacktech.<p>GRAMWEB</p></div>
                        </div>

                        <!-- no room for it
                            <div id="badge">
                            </div>
                        -->

                        <div class="tab">
                            <p>ABOUT</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="main">
            <div class="taskbar">
                <div id="search">
                    <div>
                        <svg>
                            <use href="gramweb/svg/lock.svg#lock"></use>
                        </svg>
                        
                        <input placeholder="www.gramweb.com">
                        
                        <svg>
                            <use href="gramweb/svg/refresh.svg#refresh"></use>
                        </svg>
                    </div>
                </div>

                <div id="login">
                    <!--
                        <div>
                            <h2>Guest</h2>
                        
                            <svg>
                                <use href="gramweb/svg/refresh.svg#refresh"></use>
                            </svg>
                        </div>

                        <button onclick="interface.none(this)">
                            <small>SIGN IN</small>
                        </button>
                    -->
                </div>

                <div id="island">
                    <button id="contact" onclick="interface.none(this, 5000)">
                        <svg>
                            <use href="gramweb/svg/envelope.svg#envelope"></use>
                        </svg>
                    
                        <p>Contact</p>
                    </button>

                    <button id="help" onclick="interface.none(this, 5000)">
                        <svg>
                            <use href="gramweb/svg/lightbulb.svg#lightbulb"></use>
                        </svg>
                        
                        <p>Help</p>
                    </button>
                </div>

                <button id="menu" onclick="interface.none(this)">
                    <svg>
                        <use href="gramweb/svg/compass.svg#compass"></use>
                    </svg>
                </button>
            </div>

            <div class="content">
                <div id="analog">
                    <button id="back" onclick="interface.none(this)">
                        <svg viewBox="0 0 100 100" preserveAspectRatio="none" width="25" height="7">
                            <path stroke="currentColor" fill="currentColor" d="M 50,5 95,97.5 5,97.5 Z"/>
                        </svg>
                    </button>
                    <!--placeholders go here later-->
                    <button id="next" onclick="interface.none(this)">
                        <svg viewBox="0 0 100 100" preserveAspectRatio="none" width="25" height="7">
                            <path stroke="currentColor" fill="currentColor" d="M50 95 95 2.5 5 2.5Z"/>
                        </svg>
                    </button>
                </div>

                <div id="gallery">
                    <div class="beta" id="categories">
                        <p>
                            Commission
                        </p>
                        <p>
                            Private
                        </p>
                    </div>

                    <div id="repos">
                        <div class="column"><!--
                            <div class="card1">
                                <h1>STORE LOCATIONS <button onclick="interface.none(this)"></button></h1>
                                <img src=gramweb/favicon.ico>

                                <div>
                                    <h2>LITTLE TOKYO</h2>
                                    <div>
                                        <h2>something something</h2>
                                        <p>gsrgsuhhr</p>
                                    </div>
                                </div>
                            </div>
                            <div></div>
                            <div></div>-->
                        </div>

                        <div class="column"><!--
                            <div></div>
                            <div></div>
                            <div></div>-->
                        </div>

                        <div class="column"><!--
                            <div></div>
                            <div></div>
                            <div></div>-->
                        </div>
                    </div>

                    <!--<img src="resources/barcode.png">-->
                </div>     

                <svg viewBox="0 0 0.65 0.4" preserveAspectRatio="none" width="100vw" height="100vh">
                    <path stroke="black" fill="black" d="M1 0 1 1 .4 1 1 0"/>
                </svg>
            </div>
        </div>

        <!--main here-->

        <canvas id="context" class="static"></canvas>
        
        <script src="https://cdn.jsdelivr.net/npm/animejs/lib/anime.iife.min.js"></script>
        
        <script defer src="gramweb/html/render.js"></script>
        <script defer src="scripts/networking.js"></script>
        <script defer src="scripts/math.js"></script>
        <script defer src="scripts/cookies.js"></script>
        <script defer src="gramweb/resize.js"></script>
        <script defer src="scripts/toast.js"></script>
    </body>
</html>
